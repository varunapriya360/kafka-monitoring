services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"


  kafka:
     image: confluentinc/cp-kafka:7.6.1
     depends_on:
      - zookeeper
     ports:
      - "9092:9092"
     environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  mock-service:
    build: ./mock-service
    depends_on:
      - kafka
    ports:
      - "5000:5000"
    command: sh -c "sleep 20 && uvicorn app:app --host 0.0.0.0 --port 5000"

  dhv:
    build: ./dhv
    depends_on:
      - kafka
    command: sh -c "sleep 20 && python -u consumer.py"