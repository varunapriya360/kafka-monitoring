version: "3.9"

services:
  # ---------------- Zookeeper ---------------- #
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  # ---------------- Kafka ---------------- #
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # ---------------- Mock Service ---------------- #
  mock-service:
    build: ./mock-service
    depends_on:
      - kafka
    ports:
      - "5000:5000"
    command: sh -c "sleep 20 && uvicorn app:app --host 0.0.0.0 --port 5000"

  # ---------------- DHV Consumer ---------------- #
  dhv:
    build: ./dhv
    depends_on:
      - kafka
    ports:
      - "8000:8000"   # Prometheus metrics
    command: sh -c "sleep 20 && python -u consumer.py"

  # ---------------- Prometheus ---------------- #
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - dhv

  # ---------------- Grafana ---------------- #
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus