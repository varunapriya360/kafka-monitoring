name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-deploy:
    runs-on: self-hosted

    steps:
    # 1️⃣ Checkout code
    - name: Checkout repository
      uses: actions/checkout@v4


    # 3️⃣ Install dependencies and run tests
    - name: Install dependencies
      run: |
        cd mock-service
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run tests
      run: |
        echo "Skipping for now" 

    # 4️⃣ Log in to Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 5️⃣ Build Docker image (use prebuilt FastAPI image for speed)
    - name: Build Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/mock-service:latest ./mock-service

    # 6️⃣ Push image to Docker Hub
    - name: Push Docker image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/mock-service:latest

    # 7️⃣ Deploy to Kubernetes
    - name: Set up K8s context
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'
    - name: Deploy to cluster
      run: |
        kubectl set image deployment/mock-service mock-service=${{ secrets.DOCKER_USERNAME }}/mock-service:latest
        kubectl rollout status deployment/mock-service