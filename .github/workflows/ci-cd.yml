name: CI-CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: mock-service

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }} ./mock-service
          docker tag ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest

      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/mock-service mock-service=${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest
          kubectl rollout status deployment/mock-service